name: Deploy Nodecast to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 212.227.211.154
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/nodecast-tv
            git pull origin main
            npm install
            npm run build --if-present
            pm2 restart nodecast || pm2 start npm --name nodecast -- start
            pm2 save
